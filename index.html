<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Cost Calculator</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2c3e50" />
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
  <header class="header">
    <h1>Travel Cost Calculator</h1>
    <label class="dark-toggle" aria-label="Toggle dark mode">
      <input type="checkbox" id="dark-mode-toggle" />
      <span class="toggle-slider"></span>
    </label>
  </header>

  <main class="main-content">
    <section class="calculator-section">
      <form name="calculator" id="calculator" class="form">
        <div class="form-group">
          <label for="distance">Distance (km)</label>
          <input type="number" id="distance" placeholder="e.g. 250" class="input"
            min="0.1" step="any" inputmode="decimal" autofocus />
        </div>

        <div class="form-group">
          <label for="fuel-price">
            Fuel Price (₵/Litre)
            <span id="price-loading" class="loading-dot hidden" title="Fetching live price…"></span>
          </label>
          <input type="number" id="fuel-price" value="15.00" class="input" step="0.01" min="0.01" inputmode="decimal" />
        </div>

        <div class="form-group">
          <label for="fuel-consumption">Fuel Efficiency (km/l)</label>
          <input type="number" id="fuel-consumption" value="6.7" class="input" step="0.1" min="0.1" inputmode="decimal" />
        </div>

        <button type="submit" class="btn calculate-btn">Calculate</button>
      </form>

      <div id="result" class="result"></div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Travel Cost Calculator</p>
  </footer>

  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').then(registration => {
        registration.addEventListener('updatefound', () => {
          const newWorker = registration.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              newWorker.postMessage({ action: 'skipWaiting' });
              window.location.reload();
            }
          });
        });
      });
    }
  </script>
</body>

</html>
